<!doctype html>
<html lang="en"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:440px;height:280px;overflow:hidden}
  .tile{position:relative;width:440px;height:280px;background:#0b1019;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif}
  .scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scrim{position:absolute;inset:0;background:
    linear-gradient(180deg, rgba(6,10,18,.55) 0%, rgba(6,10,18,.35) 45%, rgba(6,10,18,.8) 100%)}
  .content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 20px}
  .wordmark{font-size:46px;font-weight:900;color:#fff;line-height:1;letter-spacing:.01em;
    text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .wordmark .g{color:#7fb0ff}
  .tag{margin-top:14px;font-size:18px;font-weight:700;color:#e2ebf8;line-height:1.4;
    text-shadow:0 1px 6px rgba(0,0,0,.8)}
</style></head><body>
  <div class="tile">
    <img class="scene" src="shot1-scene.png" alt="">
    <div class="scrim"></div>
    <div class="content">
      <div class="wordmark">Cinema<span class="g">Gazer</span></div>
      <div class="tag">High-speed viewing,<br>driven by subtitle timing</div>
    </div>
  </div>
</body></html>
