<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:800px;overflow:hidden}
  .stage{position:relative;width:1280px;height:800px;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(120% 90% at 30% 25%,#2a3b57 0%,#141d2e 45%,#0b1019 100%);
    overflow:hidden}
  /* 映像を想起させる抽象ボケ */
  .bokeh{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5}
  .frame{position:absolute;inset:70px 70px 190px 70px;border-radius:14px;
    background:linear-gradient(135deg,#33507a 0%,#20304c 55%,#161f30 100%);
    box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden}
  .frame .glow{position:absolute;width:520px;height:520px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,210,140,.35),transparent 60%);left:-80px;top:-120px}
  .frame .glow2{position:absolute;width:460px;height:460px;border-radius:50%;
    background:radial-gradient(circle,rgba(120,170,255,.25),transparent 60%);right:-60px;bottom:-100px}
  /* HUD (実物と同じスタイル) */
  .hud{position:absolute;top:92px;right:92px;z-index:5;
    background:rgba(60,120,200,.9);color:#fff;border-radius:8px;padding:10px 15px;
    font-weight:700;font-size:20px;letter-spacing:.02em;
    box-shadow:0 3px 12px rgba(0,0,0,.45);font-variant-numeric:tabular-nums}
  /* 中央字幕 */
  .subtitle{position:absolute;left:0;right:0;top:300px;text-align:center;z-index:5;
    color:#fff;font-weight:800;font-size:46px;letter-spacing:.02em;
    text-shadow:0 0 6px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.7),2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000}
  .badge{display:inline-block;margin-top:22px;font-size:19px;font-weight:700;color:#bcd3f2;
    background:rgba(60,120,200,.22);border:1px solid rgba(120,170,255,.4);border-radius:999px;padding:6px 16px}
  /* 下部タイトル */
  .caption{position:absolute;left:0;right:0;bottom:52px;text-align:center}
  .title{font-size:52px;font-weight:900;color:#fff;letter-spacing:.04em}
  .title .g{color:#7fb0ff}
  .tag{margin-top:14px;font-size:24px;color:#c7d3e4;font-weight:600}
</style></head><body>
  <div class="stage">
    <div class="bokeh" style="width:90px;height:90px;left:180px;top:120px;background:#ffd27a"></div>
    <div class="bokeh" style="width:60px;height:60px;left:1050px;top:240px;background:#7fb0ff"></div>
    <div class="bokeh" style="width:120px;height:120px;left:900px;top:120px;background:#ffb27a"></div>
    <div class="frame"><div class="glow"></div><div class="glow2"></div></div>
    <div class="hud">音声　1.50×　48% 圧縮　残り 24:10</div>
    <div class="subtitle">セリフのある所は<br>「理解できる速さ」で。
      <div><span class="badge">字幕がない所は 4.0× で一気に飛ばす</span></div>
    </div>
    <div class="caption">
      <div class="title">Cinema<span class="g">Gazer</span></div>
      <div class="tag">字幕のタイミングで再生速度を自動で切り替え、動画を高速鑑賞。</div>
    </div>
  </div>
</body></html>
