<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1400px;height:560px;overflow:hidden}
  .tile{position:relative;width:1400px;height:560px;background:#0b1019;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI","Segoe UI",system-ui,sans-serif}
  .scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  /* 左側を暗くしてテキストを乗せる */
  .scrim{position:absolute;inset:0;background:
    linear-gradient(90deg, rgba(6,10,18,.92) 0%, rgba(6,10,18,.75) 38%, rgba(6,10,18,.15) 66%, rgba(6,10,18,0) 100%)}
  .content{position:absolute;left:74px;top:0;bottom:0;width:820px;display:flex;flex-direction:column;justify-content:center}
  .wordmark{font-size:78px;font-weight:900;letter-spacing:.01em;color:#fff;line-height:1}
  .wordmark .g{color:#7fb0ff}
  .tag{margin-top:22px;font-size:31px;font-weight:700;color:#dce7f7;line-height:1.45}
  .svc{margin-top:30px;display:flex;gap:12px}
  .chip{font-size:22px;font-weight:800;color:#dbe6f7;background:rgba(255,255,255,.08);
    border:1px solid rgba(127,176,255,.35);border-radius:999px;padding:8px 18px}
</style></head><body>
  <div class="tile">
    <img class="scene" src="shot1-scene.png" alt="">
    <div class="scrim"></div>
    <div class="content">
      <div class="wordmark">Cinema<span class="g">Gazer</span></div>
      <div class="tag">字幕のタイミングで再生速度を自動調整。<br>動画を高速鑑賞できる Chrome 拡張。</div>
      <div class="svc">
        <span class="chip">Netflix</span><span class="chip">Hulu</span>
        <span class="chip">Disney+</span><span class="chip">Prime Video</span>
      </div>
    </div>
  </div>
</body></html>
