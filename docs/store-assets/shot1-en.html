<!doctype html>
<html lang="en"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:800px;overflow:hidden}
  .stage{position:relative;width:1280px;height:800px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:radial-gradient(120% 90% at 30% 25%,#2a3b57 0%,#141d2e 45%,#0b1019 100%);overflow:hidden}
  .bokeh{position:absolute;border-radius:50%;filter:blur(2px);opacity:.5}
  .frame{position:absolute;inset:70px 70px 190px 70px;border-radius:14px;
    background:#0b1019;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden}
  .frame .scene{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .frame .scrim{position:absolute;inset:0;
    background:radial-gradient(58% 42% at 50% 46%, rgba(0,0,0,.5), rgba(0,0,0,0) 72%)}
  .hud{position:absolute;top:92px;right:92px;z-index:5;
    background:rgba(60,120,200,.9);color:#fff;border-radius:8px;padding:10px 15px;
    font-weight:700;font-size:20px;letter-spacing:.02em;
    box-shadow:0 3px 12px rgba(0,0,0,.45);font-variant-numeric:tabular-nums}
  .subtitle{position:absolute;left:0;right:0;top:300px;text-align:center;z-index:5;
    color:#fff;font-weight:800;font-size:46px;letter-spacing:.01em;padding:0 90px;
    text-shadow:0 0 6px rgba(0,0,0,.9),0 0 12px rgba(0,0,0,.7),2px 2px 0 #000,-2px 2px 0 #000,2px -2px 0 #000,-2px -2px 0 #000}
  .badge{display:inline-block;margin-top:22px;font-size:19px;font-weight:700;color:#bcd3f2;
    background:rgba(60,120,200,.22);border:1px solid rgba(120,170,255,.4);border-radius:999px;padding:6px 16px}
  .caption{position:absolute;left:0;right:0;bottom:52px;text-align:center}
  .title{font-size:52px;font-weight:900;color:#fff;letter-spacing:.02em}
  .title .g{color:#7fb0ff}
  .tag{margin-top:14px;font-size:23px;color:#c7d3e4;font-weight:600}
</style></head><body>
  <div class="stage">
    <div class="frame"><img class="scene" src="shot1-scene.png" alt=""><div class="scrim"></div></div>
    <div class="hud">Speech　1.50×　48% compressed　24:10 left</div>
    <div class="subtitle">Let's move.<br>We end this by dawn.</div>
    <div class="caption">
      <div class="title">Cinema<span class="g">Gazer</span></div>
      <div class="tag">Auto-adjusts playback speed by subtitle timing. Subtitles shown center-screen.</div>
    </div>
  </div>
</body></html>
