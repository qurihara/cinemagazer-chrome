<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CinemaGazer image-subtitle test</title>
<style>
  html,body{margin:0;background:#000;color:#ccc;font-family:sans-serif}
  #wrap{position:relative;width:100%}
  video{width:100%;height:auto;display:block}
  /* 画像字幕(Hulu方式)のモック: 動画下部に横長の字幕画像を重ねる */
  #subimg{position:absolute;left:10%;bottom:6%;width:80%;height:40px;visibility:hidden}
  #info{padding:8px;font-size:13px}
</style>
</head>
<body>
<div id="wrap">
  <video id="v" autoplay muted playsinline controls loop>
    <source src="../sample.mp4" type="video/mp4">
  </video>
  <!-- Hulu(hulu.jp)は字幕をビットマップ画像として<img>で重ね、visibilityで表示切替する。
       本モックはそれを再現する。data-cg-testsub はテストアダプタの検出用マーカー。 -->
  <img id="subimg" data-cg-testsub="1"
       src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
</div>
<div id="info">CinemaGazer image-subtitle (Hulu方式) test. 字幕画像の表示に同期して速度が切替わることを確認。</div>
<script>
  // 発話区間[1,3],[6,8]の間だけ字幕画像をvisibleにする(run-test.js の SPEECH_WINDOWS と一致)。
  var v = document.getElementById('v'), img = document.getElementById('subimg');
  function inSpeech(t){ return (t >= 1 && t < 3) || (t >= 6 && t < 8); }
  function tick(){
    img.style.visibility = inSpeech(v.currentTime) ? 'visible' : 'hidden';
    requestAnimationFrame(tick);
  }
  v.addEventListener('canplay', function(){ v.play().catch(function(){}); });
  requestAnimationFrame(tick);
</script>
</body>
</html>
