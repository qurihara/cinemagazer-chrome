<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CinemaGazer engine test</title>
<style>html,body{margin:0;background:#000;color:#ccc;font-family:sans-serif}
 video{width:100%;height:auto;display:block}
 #info{padding:8px;font-size:13px}</style>
</head>
<body>
<video id="v" autoplay muted playsinline controls loop>
  <source src="sample.mp4" type="video/mp4">
  <track id="t" kind="subtitles" srclang="ja" label="日本語" src="subs.vtt" default>
</video>
<div id="info">CinemaGazer engine test. 右上HUD・中央オーバーレイ・速度切替を確認。</div>
<script>
  var v = document.getElementById('v');
  function showTrack(){ try{ if(v.textTracks && v.textTracks[0]) v.textTracks[0].mode='showing'; }catch(e){} }
  v.addEventListener('loadedmetadata', showTrack);
  v.addEventListener('canplay', function(){ showTrack(); v.play().catch(function(){}); });
  showTrack();
</script>
</body>
</html>
