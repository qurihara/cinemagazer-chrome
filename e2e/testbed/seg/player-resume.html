<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CinemaGazer segmented-VTT resume test</title>
<style>html,body{margin:0;background:#000;color:#ccc;font-family:sans-serif}
 video{width:100%;height:auto;display:block}
 #info{padding:8px;font-size:13px}</style>
</head>
<body>
<!-- Disney+のレジューム再生を模擬:
     動画のcurrentTimeは 0..10(相対)だが、字幕cueは絶対時刻 1001..1008 に置かれている。
     MSEのtimestampOffset(=-1000)を CG_MEDIA_TSO で通知し、エンジンが
     segOffset=+1000 を確定して cue絶対時刻 = currentTime + 1000 で照合できることを検証する。
     補正が無ければ cue(1001..)は現在時刻(0..10)と噛み合わず速度切替が起きない。 -->
<video id="v" autoplay muted playsinline controls loop>
  <source src="../sample.mp4" type="video/mp4">
</video>
<div id="info">segmented-VTT resume test: timestampOffset=-1000 を通知し offset補正で cue整合。</div>
<script>
  var v = document.getElementById('v');
  v.addEventListener('canplay', function(){ v.play().catch(function(){}); });
  function fetchVtt(u){ var x = new XMLHttpRequest(); x.open('GET', u); x.send(); }
  fetchVtt('seg1r.vtt');
  setTimeout(function(){ fetchVtt('seg2r.vtt'); }, 3000);
  // interceptorのappendBufferフックが送るのと同じメッセージを模擬(MSE無しでcoreの補正ロジックを検証)。
  setInterval(function(){
    window.postMessage({ __cg: true, type: 'CG_MEDIA_TSO', tso: -1000 }, '*');
  }, 500);
</script>
</body>
</html>
